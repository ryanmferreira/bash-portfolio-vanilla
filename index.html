<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>booting system...</title>
    <link rel="stylesheet" href="styles/style.css">
    <link rel="stylesheet" href="styles/boot-styles.css">

    <link rel="shortcut icon" href="favicon.png" type="image/x-icon">
</head>

<body class="boot-body">

    <div class="boot-container">
        <div class="boot-log" id="bootLog">
            <div>[ <span class="boot-ok">OK</span> ] Reached target System Initialization.</div>

        <div class="boot-redirect-msg">
            Iniciando interface gráfica... Se falhar, <a href="pages/home.html">clique aqui</a>.
        </div>
    </div>

    <script src="scripts/boot-scripts.js"></script>
